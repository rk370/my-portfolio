<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Website</title>
  <style>

    body {
      background-image: url('https://wallpaperaccess.com/full/37638.jpg');
      background-size: cover;
     
      margin: 0;
      padding: 0;
      color: white;
      cursor: pointer;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* LOADER */
    .loader-box {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100px;
    }

    .loader {
      width: 80px;
      height: 80px;
      animation: spin 2s linear infinite;
      filter: drop-shadow(0 0 10px yellow);
    }

    @keyframes spin {
      0%   { transform: rotate(0deg);   }
      100% { transform: rotate(360deg); }
    }

    /* LOGIN & SIGNUP BOX */
    .login-box {
      background-color: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 40px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
      display: block;
    }

    .login-box input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .login-box input:focus {
      border-color: #2980b9;
      background: rgba(255,255,255,0.2);
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #2980b9;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      display: block;
    }

    .login-box button:hover {
      background: #1a6a9a;
      transform: translateY(-2px);
      box-shadow: 0 8px 15px yellow;
    }

    /* SIGNUP TEXT */
    .signup-text {
      margin-top: 15px;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
    }

    .signup-text a {
      color: #2980b9;
      text-decoration: none;
      font-weight: bold;
    }

    .signup-text a:hover {
      text-decoration: underline;
      color: yellow;
    }

    /* SIGNUP BOX HIDDEN */
    .signup-box {
      display: none;
    }

  </style>
</head>
<body>

  <!-- LOADER -->
  <div class="loader-box">
    <img src="full_sun.png" class="loader" alt="sun loader">
  </div>

  <!-- LOGIN BOX -->
  <div class="login-box" id="loginBox">
    <h2>Login 🚀</h2>
    <input type="email" placeholder="📧 Email">
    <input type="password" placeholder="🔒 Password">
    <button>Login</button>
    <p class="signup-text">Account nahi hai?
      <a href="#" onclick="showSignup()">Sign Up karo!</a>
    </p>
  </div>

  <!-- SIGN UP BOX -->
  <div class="login-box signup-box" id="signupBox">
    <h2>Sign Up 🎉</h2>
    <input type="text" placeholder="👤 Full Name">
    <input type="email" placeholder="📧 Email">
    <input type="password" placeholder="🔒 Password">
    <input type="password" placeholder="🔒 Confirm Password">
    <button>Sign Up</button>
    <p class="signup-text">Account hai?
      <a href="#" onclick="showLogin()">Login karo!</a>
    </p>
  </div>

  <script>
    function showSignup() {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('signupBox').style.display = 'block';
    }

    function showLogin() {
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('signupBox').style.display = 'none';
    }
  </script>

</body>
</html>
